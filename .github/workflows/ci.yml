name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint & format check
        run: bun run check

      - name: Type check
        run: bun run typecheck

      - name: Tests with coverage (100% threshold)
        run: bun test --coverage

      - name: TypeDoc build (public API must document cleanly)
        run: bunx typedoc --entryPoints src/index.ts --out docs --treatWarningsAsErrors
